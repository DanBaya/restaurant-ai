<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Review Assistant</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 1rem; }
    h2 { font-weight: 500; }
    textarea { width: 100%; height: 80px; padding: 8px; font-size: 15px; box-sizing: border-box; }
    button { margin-top: 8px; padding: 8px 20px; font-size: 15px; cursor: pointer; }
    #response { margin-top: 1.5rem; padding: 1rem; background: #f5f5f5; border-radius: 8px; min-height: 60px; line-height: 1.6; white-space: pre-wrap; }
    #loading { display: none; color: gray; margin-top: 8px; font-size: 14px; }
    .history-item { border-top: 1px solid #eee; padding: 1rem 0; }
    .history-item .q { font-weight: 500; margin-bottom: 4px; }
    .history-item .a { color: #444; line-height: 1.6; }
    .history-item .time { font-size: 12px; color: #999; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>Ask about restaurant reviews</h2>
  <textarea id="question" placeholder="e.g. What do people think about the pasta?"></textarea>
  <br>
  <button onclick="ask()">Ask</button>
  <p id="loading">Thinking...</p>
  <div id="response"></div>

  {% if history %}
  <h3 style="margin-top: 2rem; font-weight: 500;">Recent questions</h3>
  {% for question, answer, created_at in history %}
  <div class="history-item">
    <div class="q">{{ question }}</div>
    <div class="a">{{ answer }}</div>
    <div class="time">{{ created_at.strftime('%b %d %Y %I:%M %p') }}</div>
  </div>
  {% endfor %}
  {% endif %}

  <script>
    async function ask() {
      const q = document.getElementById("question").value;
      if (!q.trim()) return;
      document.getElementById("loading").style.display = "block";
      document.getElementById("response").innerText = "";

      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q })
      });

      const data = await res.json();
      document.getElementById("loading").style.display = "none";
      document.getElementById("response").innerText = data.answer;
      setTimeout(() => location.reload(), 1000);
    }
  </script>
</body>
</html>
